<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="192" height="192">
  <defs>
    <!-- Ultra-premium Matte Black background gradient -->
    <radialGradient id="matteBlack" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1e21" />
      <stop offset="60%" stop-color="#0f0f11" />
      <stop offset="100%" stop-color="#050506" />
    </radialGradient>

    <!-- 7-stop Luxury Metallic Gold Gradient -->
    <linearGradient id="goldMetallic" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B36" />
      <stop offset="18%" stop-color="#FDF1A9" />
      <stop offset="35%" stop-color="#BE9648" />
      <stop offset="50%" stop-color="#FDF1A9" />
      <stop offset="68%" stop-color="#D1A751" />
      <stop offset="85%" stop-color="#9A7B36" />
      <stop offset="100%" stop-color="#EAC775" />
    </linearGradient>

    <!-- Subtle secondary gold for shadow/ambient borders -->
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3B3" />
      <stop offset="50%" stop-color="#BE9648" />
      <stop offset="100%" stop-color="#6E4E10" />
    </linearGradient>

    <!-- Sleek drop shadow to lift the monogram off the resume backplate -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.85" />
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#9A7B36" flood-opacity="0.18" />
    </filter>

    <!-- Shadow for the resume backplate -->
    <filter id="backplateShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Background base with smooth modern rounded corners -->
  <rect width="1024" height="1024" rx="224" fill="url(#matteBlack)" />

  <!-- Outer gold accent pinstripe framing -->
  <rect x="48" y="48" width="928" height="928" rx="176" fill="none" stroke="url(#goldMetallic)" stroke-width="4" opacity="0.18" />
  <rect x="60" y="60" width="904" height="904" rx="164" fill="none" stroke="url(#goldMetallic)" stroke-width="1.5" opacity="0.08" />

  <!-- 1. SUBTLE DOCUMENT ELEMENT (The Resume Canvas Backplate) -->
  <g filter="url(#backplateShadow)" opacity="0.25">
    <!-- Main document page outline -->
    <path d="M 280 200 
             L 660 200 
             L 744 284 
             L 744 820 
             A 24 24 0 0 1 720 844 
             L 304 844 
             A 24 24 0 0 1 280 820 
             Z" 
          fill="none" 
          stroke="url(#goldMetallic)" 
          stroke-width="8" 
          stroke-linejoin="round" />
    
    <!-- Page folded corner -->
    <path d="M 660 200 L 660 284 L 744 284 Z" fill="url(#goldMetallic)" opacity="0.8" />

    <!-- Horizontal Document Resume content lines -->
    <!-- Name/Header Block -->
    <rect x="340" y="260" width="260" height="20" rx="10" fill="url(#goldMetallic)" />
    <rect x="340" y="300" width="160" height="12" rx="6" fill="url(#goldMetallic)" opacity="0.6" />

    <!-- Divider Line -->
    <line x1="340" y1="345" x2="684" y2="345" stroke="url(#goldMetallic)" stroke-width="4" opacity="0.5" stroke-linecap="round" />

    <!-- Lower text sections (Resume layout bullet blocks) -->
    <rect x="340" y="660" width="344" height="10" rx="5" fill="url(#goldMetallic)" opacity="0.4" />
    <rect x="340" y="690" width="280" height="10" rx="5" fill="url(#goldMetallic)" opacity="0.4" />
    <rect x="340" y="720" width="310" height="10" rx="5" fill="url(#goldMetallic)" opacity="0.4" />
    <rect x="340" y="750" width="190" height="10" rx="5" fill="url(#goldMetallic)" opacity="0.4" />
  </g>

  <!-- 2. LUXURY GOLD "SR" MONOGRAM -->
  <!-- Centered and translated for optical balance -->
  <g filter="url(#premiumShadow)" transform="translate(-12, 40)">
    <!-- Letter "S" -->
    <path d="M 430 370 
             C 430 290, 280 290, 280 370 
             C 280 450, 430 470, 430 550 
             C 430 630, 280 630, 280 550" 
          fill="none" 
          stroke="url(#goldMetallic)" 
          stroke-width="92" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Letter "R" -->
    <!-- Vertical stem -->
    <path d="M 540 610 L 540 310" 
          fill="none" 
          stroke="url(#goldMetallic)" 
          stroke-width="92" 
          stroke-linecap="round" />
    
    <!-- Loop of the R -->
    <path d="M 540 310 
             L 660 310 
             C 750 310, 750 460, 660 460 
             L 540 460" 
          fill="none" 
          stroke="url(#goldMetallic)" 
          stroke-width="92" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- Diagonal Leg of the R -->
    <path d="M 640 460 L 740 610" 
          fill="none" 
          stroke="url(#goldMetallic)" 
          stroke-width="92" 
          stroke-linecap="round" />

    <!-- Minimal overlay sparkles representing high-quality corporate status -->
    <path d="M 540 310 L 550 310" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.3" />
  </g>

  <!-- Small gold star in top left of document for professional certification mark -->
  <g transform="translate(320, 215) scale(1.5)" fill="url(#goldMetallic)">
    <path d="M 10 0 L 13 7 L 20 7 L 15 11 L 17 18 L 10 14 L 3 18 L 5 11 L 0 7 L 7 7 Z" />
  </g>
</svg>
